<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Fleet Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="brand-logo">🚍 LMCST Tracker</a>
        <ul class="nav-links">
            <li><a href="index.html">Student Map</a></li>
            <li><a href="driver.html">Driver Console</a></li>
            <li><a href="admin.html">Fleet Command</a></li>
        </ul>
        <div class="nav-actions">
            <a href="driver.html" class="btn btn-primary">Login</a>
        </div>
    </nav>

    <div class="main-content" style="display: block;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px;">
            <div>
                <span class="tag">System Overview</span>
                <h1 class="hero-title" style="font-size: 40px; margin-bottom: 0;">Fleet Command Center</h1>
            </div>
            <div class="status"
                style="margin: 0; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 20px; background: var(--card-bg-light);">
                <div class="status-dot active"></div>
                <span>Live Feed Syncing</span>
            </div>
        </div>

        <div class="card p-0">
            <div id="admin-map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = "/api/getAllLocations";
        let map = L.map('admin-map').setView([8.5241, 76.9366], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        let markers = {};

        const busIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        async function update() {
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                });
                const fleet = await res.json();

                fleet.forEach(bus => {
                    if (bus.lat) {
                        const pos = [bus.lat, bus.lng];
                        if (markers[bus.id]) {
                            markers[bus.id].setLatLng(pos);
                        } else {
                            // Using standard tooltip with custom CSS defined in style.css
                            markers[bus.id] = L.marker(pos, { icon: busIcon })
                                .addTo(map)
                                .bindTooltip(bus.id, { permanent: true, className: 'label', direction: 'top' });
                        }
                    }
                });
            } catch (e) {
                console.log("Syncing fleet...", e);
            }
        }
        setInterval(update, 3000);
        update();
    </script>
</body>

</html>
